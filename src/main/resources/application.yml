spring:
  application:
    name: synapse-engagement-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false

server:
  port: 8082

synapse:
  jwt:
    secret: ${SYNAPSE_JWT_SECRET:change-me-in-production-must-be-at-least-32-bytes-long-xx}

management:
  endpoints:
    web:
      exposure:
        include: health,info
