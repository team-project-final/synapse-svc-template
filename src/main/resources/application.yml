spring:
  application:
    name: synapse-knowledge-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:synapse-knowledge}
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

server:
  port: 8081

synapse:
  jwt:
    secret: ${SYNAPSE_JWT_SECRET:change-me-in-production-must-be-at-least-32-bytes-long-xx}
    access-ttl-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info
