spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-dev:5432/engagement}
    username: ${DB_USERNAME:engagement}
    password: ${DB_PASSWORD:engagement}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:redis-dev}
      port: ${REDIS_PORT:6379}
