spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-dev:5432/platform}
    username: ${DB_USERNAME:platform}
    password: ${DB_PASSWORD:platform}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:redis-dev}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.synapse.platform: INFO
