spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-dev:5432/learning}
    username: ${DB_USERNAME:learning}
    password: ${DB_PASSWORD:learning}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:redis-dev}
