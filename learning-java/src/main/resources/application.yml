spring:
  application:
    name: synapse-learning-svc-java
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:synapse-learning}
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

server:
  port: 8083

synapse:
  jwt:
    secret: ${SYNAPSE_JWT_SECRET:change-me-in-production-must-be-at-least-32-bytes-long-xx}

management:
  endpoints:
    web:
      exposure:
        include: health,info
